<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>demo frame · end card</title>
<style>
  :root{
    --surface:#fff;--ink:#1c2126;--ink-2:#4a5258;--ink-3:#7d858c;--hair:#e8e7e3;--accent:#2757cf;--well:#fafaf8;
    --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,monospace;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;width:1600px;height:1000px;overflow:hidden}
  body{display:grid;place-items:center;background:var(--surface);color:var(--ink);font:20px/1.6 var(--sans);-webkit-font-smoothing:antialiased}
  body::before{content:"";position:fixed;inset:0;background:repeating-linear-gradient(to bottom,transparent 0 43px,var(--hair) 43px 44px);-webkit-mask-image:linear-gradient(to bottom,#000,transparent 90%);mask-image:linear-gradient(to bottom,#000,transparent 90%);opacity:.5}
  .card{position:relative;text-align:center}
  .mark{width:88px;height:98px;margin:0 auto 34px;display:block}
  .mark path{fill:none;stroke:var(--ink);stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:30;stroke-dashoffset:30;animation:draw 700ms ease forwards}
  .mark path:nth-child(2){animation-delay:200ms}
  .mark path:nth-child(3){stroke:var(--accent);animation-delay:400ms}
  @keyframes draw{to{stroke-dashoffset:0}}
  h1{margin:0 0 18px;font:600 44px/1 var(--mono);letter-spacing:-.02em}
  p.tag{margin:0 0 44px;font:600 30px/1.3 var(--serif);color:var(--ink-2)}
  p.tag em{font-style:italic;color:var(--accent)}
  .chip{display:inline-flex;align-items:center;gap:14px;padding:15px 26px;border:1px solid #d7d6d1;border-radius:11px;background:var(--well);font:500 21px/1 var(--mono);color:var(--ink-2)}
  .chip .ps1{color:#b4bac0}
  p.agents{margin:26px 0 0;font:500 14px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3)}
  .fade{opacity:0;transform:translateY(10px);animation:rise 640ms cubic-bezier(.2,.8,.2,1) forwards}
  @keyframes rise{to{opacity:1;transform:none}}
</style>
</head>
<body>
  <div class="card">
    <svg class="mark" viewBox="0 0 20 22" aria-hidden="true"><path d="M4.4 3.4 10 7.6l5.6-4.2"/><path d="M4.4 8.9 10 13.1l5.6-4.2"/><path d="M4.4 14.4 10 18.6l5.6-4.2"/></svg>
    <h1 class="fade" style="animation-delay:350ms">ndrstnd</h1>
    <p class="tag fade" style="animation-delay:500ms">Understand what your agent actually did. <em>Read it like a story.</em></p>
    <span class="chip fade" style="animation-delay:700ms"><span class="ps1">$</span>ndrstnd review</span>
    <p class="agents fade" style="animation-delay:850ms">Works with Codex &amp; Claude Code</p>
  </div>
  <script>window.play = () => new Promise((r) => setTimeout(r, 3400));</script>
</body>
</html>
